<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .navbar { background: #333; padding: 1rem; color: white; display: flex; justify-content: space-between; }
        .nav-container { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; }
        .nav-links a { color: white; margin-left: 1rem; text-decoration: none; }
        .dashboard { max-width: 1200px; margin: 50px auto; padding: 20px; }
        h1 { margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-card h3 { color: #666; font-size: 14px; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #4a90e2; }
        .events { background: white; padding: 20px; border-radius: 10px; }
        .event-item { padding: 15px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div>Student Dashboard</div>
            <div class="nav-links">
                <span id="username">Loading...</span>
                <a href="#" id="logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="dashboard">
        <h1>Welcome, <span id="displayName">Student</span>!</h1>
        
        <div class="stats">
            <div class="stat-card">
                <h3>My Clubs</h3>
                <div class="value" id="clubCount">3</div>
            </div>
            <div class="stat-card">
                <h3>Upcoming Events</h3>
                <div class="value" id="eventCount">5</div>
            </div>
            <div class="stat-card">
                <h3>Announcements</h3>
                <div class="value" id="announcementCount">2</div>
            </div>
        </div>

        <div class="events">
            <h2>Upcoming Events</h2>
            <div id="eventsList">
                <div class="event-item">
                    <strong>Tech Workshop</strong> - Tomorrow at 3 PM
                </div>
                <div class="event-item">
                    <strong>Club Meeting</strong> - Friday at 5 PM
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check login
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        // Get user info
        async function loadUser() {
            try {
                const res = await fetch('http://localhost:8000/users/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const user = await res.json();
                document.getElementById('displayName').textContent = user.full_name;
                document.getElementById('username').textContent = user.username;
            } catch (err) {
                console.error('Failed to load user');
            }
        }
        loadUser();

        // Logout
        document.getElementById('logout').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
